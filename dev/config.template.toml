workspace_dir = "/synapseclaw-data/workspace"
config_path = "/synapseclaw-data/.synapseclaw/config.toml"
# This is the Ollama Base URL, not a secret key
api_key = "http://host.docker.internal:11434"
default_provider = "ollama"
default_model = "llama3.2"
default_temperature = 0.7

[channels_config]
# Human-facing default: keep messenger chats compact.
# Set to true only if you explicitly want raw tool trace in channels.
show_tool_calls = false

[gateway]
port = 42617
host = "[::]"
allow_public_bind = true
